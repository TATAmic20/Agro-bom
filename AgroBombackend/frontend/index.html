<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGROBOM - Login</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<!-- ===================================================== -->
<!-- TELA DE LOGIN DO SISTEMA AGROBOM                      -->
<!-- Página inicial utilizada para acessar o sistema       -->
<!-- ===================================================== -->
<body class="login-body">

	<!-- ===================================================== -->
	<!-- CONTAINER PRINCIPAL                                   -->
	<!-- Divide a tela entre formulário e imagem ilustrativa   -->
	<!-- ===================================================== -->
	<div class="login-container">

		<!-- ===================================================== -->
		<!-- ÁREA DE LOGIN                                         -->
		<!-- Contém logo, campos de acesso e botão de entrada      -->
		<!-- ===================================================== -->
		<div class="login-left">
            <div class="login-box">

				<!-- Logo oficial do sistema AGROBOM -->
				<img src="img/Logo1.png" alt="Logo AGROBOM" class="logo">

                <h2>Bem-Vindo!</h2>
                <p class="subtitle">Faça login para acessar o sistema</p>

				<!-- ===================================================== -->
				<!-- FORMULÁRIO DE ACESSO                                  -->
				<!-- Utilizado para simular a autenticação do usuário      -->
				<!-- ===================================================== -->
				<form>
					<!-- Campo para entrada do e-mail -->
					<div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="Digite seu e-mail" required>
                    </div>

					<!-- Campo para entrada da senha -->
					<div class="input-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="Digite sua senha" required>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Esqueceu da senha?</a>
                    </div>

					<!-- Botão de acesso ao sistema -->
					<a href="sobre.html" class="btn-submit">
					    Entrar
					</a>
                </form>

            </div>
        </div>

		<!-- ===================================================== -->
		<!-- ÁREA VISUAL                                           -->
		<!-- Exibe a imagem de fundo relacionada ao agronegócio    -->
		<!-- ===================================================== -->
		<div class="login-right"></div>

    </div>
	<!-- ===================================================== -->
	<!-- FIM DA TELA DE LOGIN                                  -->
	<!-- Primeira página exibida ao usuário                    -->
	<!-- ===================================================== -->
</body>
</html>
